#
# SSOT набора репо+пинов переехал в командный зонтик:
#     ai-orchestrators-workspace/workspace-manifest.toml (schema v0.3, секция [tools]).
# Тулинг наведён туда: Makefile (MANIFEST ?= ../ai-orchestrators-workspace/...),
# repos.sh install, check-release-drift.py (дефолт --manifest).
#
# Оставлено как исторический snapshot (2026-07-12). НЕ редактировать как живой набор —
# правки набора идут PR-ом в зонтик. Держать два живых манифеста = дубль SSOT (запрещено).
# ============================================================================
#
# release-manifest.toml — SSOT согласованного релиз-набора (schema v0.2, hardened)
#
# Дом: devtools/. READ-ONLY по репо. Снимок фактов: 2026-07-12.
#
# ── Что изменилось vs v0.1 (по ревью) ──
#   * Плоская схема разведена на явные поля (component_id != repo != package != path).
#   * Поддержка workspace-member (atp-platform-sdk внутри atp-platform).
#   * tag_pattern вместо "ближайшего тега" (umbrella v* vs component atp-sdk-v*).
#   * tag="-" запрещён для установки: нужен pinned sha (install=git-sha).
#   * Разделены pin_range (абстрактный, для pyproject потребителя) и
#     lock_version (точный, для lock/набора). Точная версия — только в concrete-слое.
#
# ── Схема поля (см. check-release-drift.py: REQUIRED/OPTIONAL) ──
#   package_name   строка, имя дистрибутива (dist name), НЕ равно component_id
#   repo_url       git remote (владелец тегов/публикации)
#   git_dir        путь к .git относительно workspace (для member = родительский repo)
#   pyproject_path путь к pyproject.toml (откуда читается version) отн. workspace
#   tag_pattern    glob для `git tag --list` (umbrella="v*", sdk="atp-sdk-v*")
#   tag            последний тег, matching tag_pattern ("-" если тегов нет)
#   sha            пиненый коммит; ОБЯЗАТЕЛЕН при install=git-sha; при install=git-tag
#                  (если указан) = commit тега — иначе sha_tag_mismatch (warn)
#   install        "pypi" | "git-tag" | "git-sha"   (HEAD запрещён)
#   lock_version   точная версия для набора/lock (concrete)
#   pin_range      абстрактный диапазон для pyproject потребителя (напр. ">=2.9,<3")
#   publish        "pypi" | "none"
#   rust           true если нужна нативная сборка (cargo/maturin)
#   branch         фактическая ветка, если НЕ дефолтная (флаг для внимания)

schema_version = "0.2.0"
generated = "2026-07-12"
ecosystem_release = "unreleased"

# ══════════════ СЛОЙ ЯДЕР (publish=pypi, потребляются как пакеты) ══════════════

[cores.spec-runner]
package_name   = "spec-runner"
repo_url       = "git@github.com:andrei-shtanakov/spec-runner.git"
git_dir        = "spec-runner"
pyproject_path = "spec-runner/pyproject.toml"
tag_pattern    = "v*"
tag            = "v2.9.0"
install        = "pypi"
lock_version   = "2.9.0"
pin_range      = ">=2.9,<3"      # ← едет в pyproject потребителей вместо устаревшего >=0.1.x
publish        = "pypi"
rust           = false
consumers      = ["arbiter", "atp-platform"]

[cores.atp-platform-sdk]                 # workspace-member ВНУТРИ atp-platform
package_name   = "atp-platform-sdk"
repo_url       = "git@github.com:andrei-shtanakov/atp-platform.git"
git_dir        = "atp-platform"
pyproject_path = "atp-platform/packages/atp-sdk/pyproject.toml"
tag_pattern    = "atp-sdk-v*"
tag            = "atp-sdk-v2.0.0"
install        = "pypi"
lock_version   = "2.0.0"
pin_range      = ">=2.0,<3"
publish        = "pypi"
rust           = false
consumers      = ["Maestro"]

[cores.atp-platform]                     # umbrella-дистрибутив
package_name   = "atp-platform"
repo_url       = "git@github.com:andrei-shtanakov/atp-platform.git"
git_dir        = "atp-platform"
pyproject_path = "atp-platform/pyproject.toml"
tag_pattern    = "v*"
tag            = "v2.1.0"
install        = "pypi"
lock_version   = "2.1.0"
pin_range      = ">=2.1,<3"
publish        = "pypi"
rust           = false
consumers      = []
members        = ["atp-core","atp-adapters","atp-dashboard","atp-method","atp-games","game-environments","atp-platform-sdk"]

# ══════════════ СЛОЙ ПРИЛОЖЕНИЙ ══════════════
# Нет publish, чаще нет тега → install=git-sha с ОБЯЗАТЕЛЬНЫМ sha (HEAD запрещён).

[apps.Maestro]
package_name   = "maestro"
repo_url       = "git@github.com:andrei-shtanakov/Maestro.git"
git_dir        = "Maestro"
pyproject_path = "Maestro/pyproject.toml"
tag_pattern    = "v*"
tag            = "v0.2.0"          # ⚠ pyproject=0.4.0 > tag: релиз не нарезан (tag_behind)
sha            = "e4f0a9fa2884"     # commit тега v0.2.0 (провенанс, НЕ HEAD); проверяется sha_tag_mismatch
install        = "git-tag"          # ставим на v0.2.0; поднять после нового тега
lock_version   = "0.2.0"
publish        = "none"
rust           = false

